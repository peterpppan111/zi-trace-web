<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="view-transition" content="same-origin">
  <title>繁簡轉換 · 漢字源流</title>
  <meta name="description" content="練習簡體字與繁體字的對應關係，包括詞組轉換與單字轉換。數據來源：武漢大學文學院古代漢語教學團隊。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=11">
  <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="convert.css?v=2">
</head>
<body>
<main class="app">

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <div class="brand-icon">文</div>
      <span class="brand-text">漢字源流</span>
    </a>
    <div class="navbar-nav">
      <a href="index.html" class="nav-link">字形查詢</a>
      <a href="idioms.html" class="nav-link">題庫練習</a>
      <a href="convert.html" class="nav-link active">繁簡轉換</a>
      <a href="index.html" class="btn-icon" title="前往字形演變查詢">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        字形查詢
      </a>
    </div>
  </nav>

  <!-- Header -->
  <header class="page-header">
    <h1 class="page-title cvt-title">繁簡轉換練習</h1>
    <p class="page-subtitle">掌握簡體字與繁體字的對應關係，精準識讀，準確書寫。</p>
  </header>

  <!-- Notice Banner -->
  <div class="notice-banner" id="noticeBanner">
    <span>✦</span>
    <span class="notice-text">數據來源：武漢大學文學院古代漢語教學團隊整理（易錯繁簡字），以及附錄三：部分簡化字與繁體字對照表。</span>
    <button class="notice-close" onclick="this.parentElement.remove()">×</button>
  </div>

  <!-- 歡迎回來橫幅（有進度才顯示） -->
  <div class="cvt-welcome-banner" id="welcomeBanner" style="display:none;">
    <span class="cvt-welcome-icon">👋</span>
    <span class="cvt-welcome-text" id="welcomeText"></span>
  </div>

  <!-- Mode Tabs -->
  <div class="cvt-mode-tabs" id="modeTabs">
    <button class="cvt-mode-tab active" data-mode="phrase" id="phraseTab">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      詞組練習
      <span class="cvt-tab-count" id="phraseCount">—</span>
    </button>
    <button class="cvt-mode-tab" data-mode="char" id="charTab">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>
      單字練習
      <span class="cvt-tab-count" id="charCount">—</span>
    </button>
  </div>

  <!-- Sub Controls -->
  <div class="cvt-controls" id="cvtControls">
    <div class="cvt-controls-left">
      <div class="cvt-filter-chips" id="filterChips">
        <button class="cvt-chip active" data-filter="all">全部</button>
        <button class="cvt-chip" data-filter="unseen">未練</button>
        <button class="cvt-chip" data-filter="wrong">易錯</button>
        <button class="cvt-chip" data-filter="mastered">已掌握</button>
      </div>
    </div>
    <div class="cvt-controls-right">
      <div class="mode-switch">
        <button id="learnModeBtn" class="mode-btn active">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
          學習
        </button>
        <button id="testModeBtn" class="mode-btn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>
          測驗
        </button>
      </div>
      <button id="shuffleBtn" class="btn btn-sm">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
        洗牌
      </button>
      <button id="resetProgressBtn" class="btn btn-sm btn-danger-ghost">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        重置進度
      </button>
    </div>
  </div>

  <!-- Progress Bar Area -->
  <div class="cvt-progress-area" id="progressArea">
    <div class="cvt-progress-bar-wrap">
      <div class="cvt-progress-label">
        <span id="progressText">掌握 0 / 0</span>
        <span class="cvt-progress-badges" id="progressBadges"></span>
      </div>
      <div class="cvt-progress-track">
        <div class="cvt-progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- Quiz Card Area -->
  <section class="cvt-quiz-section" id="quizSection" style="display:none">
    <div class="cvt-card" id="quizCard">
      <!-- Dynamically rendered -->
    </div>
    <div class="cvt-card-nav">
      <button class="btn btn-sm" id="prevCardBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        上一題
      </button>
      <span class="cvt-card-counter" id="cardCounter">1 / 1</span>
      <button class="btn btn-sm" id="nextCardBtn">
        下一題
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  </section>

  <!-- Browse Grid (Learning mode) -->
  <section class="cvt-grid-section" id="gridSection">
    <div class="cvt-grid" id="cvtGrid">
      <!-- Cards rendered here -->
    </div>
    <div class="cvt-empty" id="cvtEmpty" style="display:none">
      <div class="cvt-empty-icon">🎉</div>
      <p>此篩選條件下暫無詞條</p>
      <button class="btn btn-sm" onclick="document.querySelector('[data-filter=all]').click()">顯示全部</button>
    </div>
  </section>

  <!-- Session Summary (Test mode end) -->
  <div class="cvt-summary" id="cvtSummary" style="display:none">
    <div class="cvt-summary-inner">
      <div class="cvt-summary-icon">📊</div>
      <h2>本輪測驗結果</h2>
      <div class="cvt-summary-stats" id="summaryStats"></div>
      <div class="cvt-summary-actions">
        <button class="btn btn-primary" id="retryWrongBtn">只練易錯</button>
        <button class="btn btn-sm" id="restartBtn">重新開始</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <p>詞組數據來源：武漢大學文學院古代漢語教學團隊整理（易錯繁簡字）<br>
    單字數據來源：附錄三：部分簡化字與繁體字對照表。本工具僅供學習與交流。</p>
  </footer>

</main>

<!-- Global Quick Search Modal -->
<div id="quickSearchModal" class="quick-search-overlay" style="display: none;">
  <div class="quick-search-container">
    <div class="quick-search-header">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input type="text" id="quickSearchInput" class="quick-search-input" placeholder="輸入單字快速查詢... (ESC 關閉)" maxlength="1" autocomplete="off">
      <button id="closeQuickSearchBtn" class="close-search-btn" title="關閉">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <div id="quickSearchResults" class="quick-search-results"></div>
  </div>
</div>

<script src="convert_data.js" defer></script>
<script src="convert.js?v=1" defer></script>
<script src="quick-search.js?v=2" defer></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(registrations) {
      for(let registration of registrations) {
        registration.unregister();
      }
    });
  }
</script>
</body>
</html>
