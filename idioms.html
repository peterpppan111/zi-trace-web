<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>題庫練習 · 漢字源流</title>
  <meta name="description" content="從古文字還原字表中抽取四字成語，練習甲骨文、金文字形識讀。所有成語均確認每字具有古字形。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=10">
  <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
</head>
<body>
<main class="app">

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <div class="brand-icon">文</div>
      <span class="brand-text">漢字源流</span>
    </a>
    <div class="navbar-nav">
      <a href="index.html" class="nav-link">字形查詢</a>
      <a href="idioms.html" class="nav-link active">題庫練習</a>
      <button id="shareVersionBtn" class="btn-share" title="複製此版本的分享連結給他人">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        複製分享連結
      </button>
    </div>
  </nav>

  <!-- Header -->
  <header class="page-header">
    <h1 class="page-title museum-title" aria-label="古文字成語">
      <div class="ancient-chars" id="titleChars">
        <div class="char-container" data-char="古">
          <span class="char-bone" style="--bg-image: url('images/title/gu.png');" title="古"></span>
          <span class="char-modern">古</span>
        </div>
        <div class="char-container" data-char="文">
          <span class="char-bone" style="--bg-image: url('images/title/wen.png');" title="文"></span>
          <span class="char-modern">文</span>
        </div>
        <div class="char-container" data-char="字">
          <span class="char-bone" style="--bg-image: url('images/title/zi.png');" title="字"></span>
          <span class="char-modern">字</span>
        </div>
        <div class="char-container" data-char="成">
          <span class="char-bone" style="--bg-image: url('images/title/cheng.png');" title="成"></span>
          <span class="char-modern">成</span>
        </div>
        <div class="char-container" data-char="語">
          <span class="char-bone" style="--bg-image: url('images/title/yu.png');" title="語"></span>
          <span class="char-modern">語</span>
        </div>
      </div>
    </h1>
    <p class="page-subtitle">所有成語均篩選自古文字還原字表，確保每個字都具有甲骨文、金文或戰國文字字形。</p>
  </header>

  <!-- Notice -->
  <div class="notice-banner" id="noticeBanner">
    <span>✦</span>
    <span class="notice-text">字庫說明：所有成語每字均有古字形記錄。點擊成語查看古字形，學習模式顯示答案，測驗模式遮蔽答案。</span>
    <button class="notice-close" onclick="this.parentElement.remove()">×</button>
  </div>

  <!-- Tier tabs -->
  <div class="tier-tabs" id="tierTabs">
    <button class="tier-tab active" data-bank="review">
      最後過輪
      <span class="tier-count">68詞</span>
    </button>
    <button class="tier-tab" data-bank="sprint">
      考前衝刺
      <span class="tier-count">120詞</span>
    </button>
    <button class="tier-tab" data-bank="essential">
      重點範圍
      <span class="tier-count">444詞</span>
    </button>
    <button class="tier-tab" data-bank="common">
      常用題庫
      <span class="tier-count">691詞</span>
    </button>
    <button class="tier-tab" data-bank="all">
      完整題庫
      <span class="tier-count">3045詞</span>
    </button>
  </div>

  <!-- Controls -->
  <div class="controls-row">
    <div class="controls-left">
      <span class="section-label" id="sectionTitle">可選成語</span>
      <span class="batch-tag" id="batchInfo"></span>
    </div>
    <div class="controls-right">
      <div class="mode-switch">
        <button id="learnModeBtn" class="mode-btn active">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
          學習
        </button>
        <button id="testModeBtn" class="mode-btn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>
          測驗
        </button>
      </div>
      <button id="refreshBtn" class="btn btn-sm">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        換一批
      </button>
    </div>
  </div>

  <!-- Idiom grid -->
  <div id="idiomOptions" class="idiom-grid"></div>

  <!-- Preview strip -->
  <section id="sentencePreview" class="preview-section" style="display:none">
    <div class="preview-header">
      <div class="preview-header-left">
        <h3>古字形拼寫</h3>
        <div class="preview-subtitle">取每個字最古老的字形（甲骨文 › 金文 › 戰國文字 › 小篆）</div>
      </div>
      <a id="bingSearchBtn" href="#" target="_blank" rel="noopener" class="btn btn-sm">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        在 Bing 搜尋此詞
      </a>
    </div>
    <div id="sentenceSequence" class="char-sequence"></div>
    <div class="reveal-wrap" style="display:flex; gap:12px; justify-content:center;">
      <button id="revealBtn" class="btn btn-accent reveal-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        揭開答案
      </button>
      <button id="nextBtn" class="btn btn-primary" style="display:none">
        下一題
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  </section>

  <!-- Results -->
  <section id="resultsContainer" class="results-grid"></section>

  <footer class="site-footer">
    <p>字形數據來源：<a href="https://xiaoxue.iis.sinica.edu.tw/yanbian" target="_blank" rel="noopener">中央研究院小學堂漢字古今字資料庫</a><br>
    所有成語均篩選確認每字具有古字形。本工具僅供學習，版權歸中央研究院所有。</p>
  </footer>
</main>

<!-- Card template -->
<template id="charTemplate">
  <div class="char-card">
    <div class="card-header">
      <h2 class="card-char"></h2>
      <div class="card-controls">
        <div class="loading-indicator">
          <div class="spinner"></div>
          <span>查詢中…</span>
        </div>
        <div class="error-tag"></div>
        <button class="btn btn-sm expand-btn" style="display:none">收起演變表</button>
      </div>
    </div>
    <div class="card-content"></div>
  </div>
</template>

<script src="idioms_data.js"></script>
<script src="idioms.js?v=6"></script>
</body>
</html>
